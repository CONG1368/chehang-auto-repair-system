# 车行综合管理系统 — CI/CD 部署流水线
# 触发条件：推送到 main 分支 或 手动触发
#
# 需要在 GitHub Secrets 中配置以下变量：
#   DATABASE_URL      — 数据库连接字符串（如 mysql://user:pass@host:3306/db）
#   SSH_HOST          — 云服务器 IP 或域名
#   SSH_USER          — SSH 登录用户名（如 root）
#   SSH_PRIVATE_KEY   — SSH 私钥（用于免密登录服务器）

name: 部署到云服务器

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  构建并部署:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 3. 安装 pnpm
      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 4. 安装项目依赖
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 5. 生成 Prisma 客户端
      - name: 生成 Prisma 客户端
        run: pnpm db:generate

      # 6. 构建后端
      - name: 构建后端服务
        run: pnpm build:server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 7. 构建前端
      - name: 构建前端管理后台
        run: pnpm build:web

      # 8. 运行单元测试
      - name: 运行单元测试
        run: pnpm --filter server test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://root:root123456@localhost:3306/auto_repair?charset=utf8mb4' }}
          JWT_SECRET: test-jwt-secret-for-ci

      # 9. 准备 E2E 测试数据库
      - name: 准备 E2E 测试数据库
        run: |
          npx prisma db push --force
          pnpm db:seed
        working-directory: packages/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://root:root123456@localhost:3306/auto_repair?charset=utf8mb4' }}

      # 10. 运行 E2E 测试
      - name: 运行 E2E 测试
        run: npx playwright test --reporter=list
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://root:root123456@localhost:3306/auto_repair?charset=utf8mb4' }}
          JWT_SECRET: test-jwt-secret-for-ci

      # 11. 通过 SSH 部署到云服务器
      - name: 部署到云服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/chehang-auto
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm db:generate
            pnpm build:server && pnpm build:web
            pm2 restart chehang-server
            echo "部署完成 $(date '+%Y-%m-%d %H:%M:%S')"
